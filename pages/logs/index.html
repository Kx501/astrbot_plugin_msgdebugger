<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MsgDebugger 管线日志</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="toolbar">
      <div class="toolbar-left">
        <h1>管线日志</h1>
        <span id="runtimeBadge" class="runtime-badge"></span>
      </div>
      <div class="toolbar-actions">
        <label class="inline">
          <input type="checkbox" id="autoRefresh" checked />
          自动刷新
        </label>
        <label class="inline">
          <input type="checkbox" id="fastRefresh" />
          1s
        </label>
        <button type="button" id="btnRefresh">刷新</button>
        <button type="button" id="btnClear" class="danger">清空</button>
        <button type="button" id="btnToggleFilters" class="ghost">筛选</button>
      </div>
    </header>

    <section id="filterPanel" class="panel filters-panel" hidden>
      <div class="filter-group">
        <span class="filter-title">视图</span>
        <div id="presetRow" class="preset-row"></div>
      </div>
      <div class="filter-group">
        <span class="filter-title">阶段</span>
        <div id="stageToggles" class="toggle-row"></div>
      </div>
      <div class="filter-group advanced-filters">
        <span class="filter-title">字段</span>
        <div id="fieldToggles" class="toggle-row"></div>
      </div>
      <div class="filter-group">
        <span class="filter-title">选项</span>
        <label class="inline"><input type="checkbox" id="optDiff" /> 高亮差异</label>
        <label class="inline"><input type="checkbox" id="optCollapse" checked /> 折叠长文本</label>
        <input type="text" id="umoFilter" placeholder="过滤 umo / 发送者…" />
      </div>
    </section>

    <main id="traceList" class="trace-list"></main>
    <template id="traceTpl">
      <article class="trace-card">
        <header class="trace-head"></header>
        <div class="trace-body">
          <nav class="stage-tabs"></nav>
          <div class="stage-panels"></div>
        </div>
      </article>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
